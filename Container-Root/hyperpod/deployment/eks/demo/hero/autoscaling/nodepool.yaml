apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: sample-np
spec:
  # Resource limits constrain the total size of the pool
  limits:
    nvidia.com/gpu: 6
  
  # Disruption settings for node lifecycle management
  disruption:
    budgets:
      - nodes: 30%
    consolidateAfter: 0s
    consolidationPolicy: WhenEmpty
  
  template:
    spec:
      # Node expiration - Never means nodes won't expire automatically
      expireAfter: Never
      
      # Taints for GPU nodes
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      
      # Reference to the HyperpodNodeClass
      nodeClassRef:
        group: karpenter.sagemaker.amazonaws.com
        kind: HyperpodNodeClass
        name: sample-nc
      
      # Requirements for node selection
      requirements:
        # Match instance type
        - key: node.kubernetes.io/instance-type
          operator: Exists